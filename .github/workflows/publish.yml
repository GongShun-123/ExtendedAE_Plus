name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Read metadata
        id: metadata
        shell: bash
        run: |
          mod_id="$(grep '^mod_id=' gradle.properties | cut -d'=' -f2-)"
          mod_version="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2-)"
          artifact_name="${mod_id}-${mod_version}.jar"
          echo "artifact_path=build/libs/${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ${{ steps.metadata.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 30
